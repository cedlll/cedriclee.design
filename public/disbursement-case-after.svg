  <text x="40" y="214" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5c5852">Typical completion within 2 business days · notified at each step</text>
  <rect x="40" y="226" width="72" height="22" rx="3" fill="#e8f0ec"/>
  <text x="48" y="241" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#2d6a4f">Processing</text>
  <rect x="120" y="226" width="72" height="22" rx="3" fill="#2d6a4f"/>
