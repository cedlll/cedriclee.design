  <rect x="200" y="226" width="72" height="22" rx="3" fill="#e8f0ec"/>
  <text x="208" y="241" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#5c5852">Completed</text>
  <rect x="24" y="264" width="592" height="72" rx="4" fill="#fff" stroke="#c4bfb6" stroke-width="1"/>
  <text x="40" y="292" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#8a847a">Outbound cadence (if eligible)</text>
  <text x="40" y="316" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#3d3a36">Monthly · Bi-weekly · On-demand</text>
</svg>
