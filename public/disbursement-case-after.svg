<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Illustrative after state: clear lifecycle, ETA, and self-service payout options">
  <rect width="640" height="360" fill="#ebe8e3"/>
  <rect x="24" y="20" width="592" height="40" rx="4" fill="#d8d4cc"/>
  <text x="40" y="46" font-family="ui-monospace, monospace" font-size="13" fill="#3d3a36">Disbursements</text>
  <rect x="24" y="76" width="592" height="52" rx="4" fill="#fff" stroke="#c4bfb6" stroke-width="1"/>
  <text x="40" y="98" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#8a847a">Payout to your bank (settlement)</text>
  <text x="40" y="118" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#3d3a36">Monthly · separate from outbound disbursements</text>
  <rect x="24" y="140" width="592" height="108" rx="4" fill="#fff" stroke="#2d6a4f" stroke-width="1.5"/>
