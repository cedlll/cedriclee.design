<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga Game</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="/" class="close-button" aria-label="Close and return to cclee.design">×</a>
    <div class="game-container">
        <div class="game-header">
            <div class="score-section">
                <div class="player-score">
                    <div class="score-label">SCORE</div>
                    <div class="score-value" id="score">00000</div>
                </div>
                <div class="high-score">
                    <div class="score-label">HIGH SCORE</div>
                    <div class="score-value" id="highScore">00000</div>
                </div>
                <div class="lives">
                    <div class="score-label">LIVES</div>
                    <div class="score-value" id="lives">3</div>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        
        <div class="game-controls">
            <div class="start-screen" id="startScreen">
                <h1>GALAGA</h1>
                <p class="desktop-instructions">Use ARROW KEYS to move</p>
                <p class="desktop-instructions">Press SPACE to shoot</p>
                <p class="mobile-instructions">Use the buttons below to move and shoot</p>
                <button id="startButton">START GAME</button>
            </div>
            
            <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                <h1>GAME OVER</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartButton">PLAY AGAIN</button>
            </div>
        </div>
        
        <div class="instructions">
            <p class="desktop-instructions">← → Move Left/Right | SPACE Shoot | ESC Pause</p>
            <p class="mobile-instructions">Use buttons below to move and shoot</p>
        </div>
        
        <div class="touch-controls" id="touchControls" aria-hidden="true">
            <button type="button" class="touch-btn touch-left" id="touchLeft" aria-label="Move left">←</button>
            <button type="button" class="touch-btn touch-shoot" id="touchShoot" aria-label="Shoot">●</button>
            <button type="button" class="touch-btn touch-right" id="touchRight" aria-label="Move right">→</button>
            <button type="button" class="touch-btn touch-pause" id="touchPause" aria-label="Pause">⏸</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
