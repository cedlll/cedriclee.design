<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="/" class="close-button" aria-label="Close and return to cclee.design">×</a>
    <div class="game-container">
        <div class="game-header">
            <div class="score-section">
                <div class="player-score">
                    <div class="score-label">1UP</div>
                    <div class="score-value" id="score">00</div>
                </div>
                <div class="high-score">
                    <div class="score-label">HIGH SCORE</div>
                    <div class="score-value" id="highScore">20000</div>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="game-controls">
            <div class="start-screen" id="startScreen">
                <h1>GALAGA</h1>
                <p>Use ARROW KEYS to move</p>
                <p>Press SPACE to shoot</p>
                <button id="startButton">START GAME</button>
            </div>
            
            <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                <h1>GAME OVER</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartButton">PLAY AGAIN</button>
            </div>
        </div>
        
        <div class="instructions">
            <p>← → Move Left/Right | SPACE Shoot | ESC Pause</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
